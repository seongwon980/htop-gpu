name: Publish to PyPI

# Triggered by pushing a tag like v0.1.0 or v1.2.3 to GitHub.
# Build the sdist + wheel and upload via PyPI Trusted Publishing.
#
# Setup checklist (one-time, on PyPI):
#   1. Create the project on PyPI (you already did when you uploaded 0.1.0
#      manually with `twine upload`). For brand-new projects, see the
#      "pending" trusted publisher flow at https://docs.pypi.org/trusted-publishers
#   2. Go to https://pypi.org/manage/project/htop-gpu/settings/publishing/
#   3. Add a Trusted Publisher with:
#        Owner:        seongwon980
#        Repository:   htop-gpu
#        Workflow:     publish.yml
#        Environment:  release   (matches the env: line below)
#   4. After that, every `git tag v0.1.1 && git push --tags` will publish
#      automatically — no PyPI token needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# Force every JavaScript-based action (checkout, setup-python, upload/
# download-artifact, …) onto Node 24, even when the action's metadata
# still requests Node 20. Silences the runner deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/htop-gpu/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
