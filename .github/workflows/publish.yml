name: Publish to PyPI

# Triggered by pushing a tag like v0.1.0 or v1.2.3 to GitHub.
# Builds the sdist + wheel and uploads via PyPI Trusted Publishing.
#
# Setup checklist (one-time, on PyPI):
#   1. https://pypi.org/manage/project/htop-gpu/settings/publishing/
#   2. Add a Trusted Publisher with:
#        Owner:        seongwon980
#        Repository:   htop-gpu
#        Workflow:     publish.yml
#        Environment:  release   (matches the env: line below)
#   3. After that, every `git tag vX.Y.Z && git push --tags` publishes
#      automatically — no PyPI token needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/htop-gpu/
    permissions:
      id-token: write   # Trusted Publishing OIDC
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Publish via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
